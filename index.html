<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market List Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
</head>

<body>
    <div class="app-card">
        <header>
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                <h1 style="margin-bottom: 0;"> 🛒 Mercado</h1>
                <button id="themeToggle" onclick="toggleTheme()" style="background: none; border: none; cursor: pointer; color: var(--text); padding: 10px; margin: -10px;">
                    <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    <svg id="icon-sun" style="display: none;" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72 1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                </button>
            </div>
            <p id="data-atual" style="margin-top: 5px;"></p>
        </header>
        <div class="input-container">
            <input type="text" id="itemInput" placeholder="Item...">
            <input type="number" id="qtdInput" placeholder="Qtd" value="1" min="1">
            <input type="number" id="valorInput" placeholder="R$">
            <button onclick="adicionarItem()" class="btn-add">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
            </button>
        </div>
        <ul id="listaCompras" class="scroll-area"></ul>
        <footer class="total-footer">
            <div class="total-info">
                <span>Total da Compra</span>
                <h2 id="valorTotal"> R$ 0,00 </h2>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => {
                    console.log('Service Worker registrado!', reg);
                }).catch(err => {
                    console.error('Falha ao registrar Service Worker', err);
                });
            });
        }
    </script>
</body>

</html>
